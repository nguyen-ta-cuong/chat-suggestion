name: Bug report
description: Report a reproducible problem with Chat Suggestion for Pi.
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Chat Suggestion. Search existing issues first and remove private prompts, credentials, headers, paths, and repository content from everything you submit.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched open and closed issues for this problem.
          required: true
        - label: I reproduced the problem with the latest release.
          required: true
        - label: I removed sensitive information from this report.
          required: true
  - type: input
    id: extension-version
    attributes:
      label: Chat Suggestion version
      description: Run `pi list` and provide the installed package version.
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: pi-version
    attributes:
      label: Pi version
      description: Run `pi --version`.
      placeholder: 0.80.6
    validations:
      required: true
  - type: dropdown
    id: operating-system
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - WSL
        - Other
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation method
      options:
        - Pi npm package
        - Project-local Pi package
        - Local checkout with pi -e
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the visible behavior and why it is a problem.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description:
        Give the shortest safe sequence that consistently reproduces the
        problem.
      placeholder: |
        1. Start Pi with ...
        2. Type a synthetic prompt such as ...
        3. Press ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Sanitized diagnostics
      description:
        Add minimal logs or screenshots only after removing prompts,
        credentials, headers, private paths, and repository content.
      render: text
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description:
        Include relevant terminal, model-provider, custom-editor, or
        autocomplete details without private content.
    validations:
      required: false
